swagger: '2.0'
info:
  title: VouckBack
  description: |-
    Microserviço para geração de voucher como descontos em valor ou percentual paras clientes em seu ponto de venda.

    _Se você que saber mais sobre a REMATEC, então  click [aqui](http://rematecvarejo.com.br). Aproveite e nos façam uma visita!_
    
    contact:
    email: mario7lagoas@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11
host: localhost:8080
basePath: /voucher-back/v1
schemes:
  - http
  - https

tags:
  - name: Perfil
paths:
  /perfil:
    get:
      tags:
        - Perfil
      summary: Buscando Lista de Perfil
      description: Buscando Lista de Perfil na Plataforma
      operationId: buscandoListaPerfil
      produces:
        - application/json
      responses:
        '200':
          description: successful operation
          schema:
            type: array
            items:
              $ref: '#/definitions/PerfilApiResponse'
  /perfil/resumido:
    get:
      tags:
        - Perfil
      summary: Buscando Lista de Perfil Resumido
      description: Buscando Lista de Perfil Resumido na Plataforma
      operationId: buscandoListaResumidoPerfil
      produces:
        - application/json
      responses:
        '200':
          description: successful operation
          schema:
            type: array
            items:
              $ref: '#/definitions/PerfilResumidoApiResponse'
  /perfil/{guid}:
    get:
      tags:
        - Perfil
      summary: Buscando Perfil Pelo Perfil GUID
      description: Buscando Perfil Pelo Perfil GUID na Plataforma
      operationId: buscandoPerfilPeloGUID
      produces:
        - application/json
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          type: string
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/PerfilApiResponse'
        '404':
          description: not found operation
          schema:
            type: object
            properties:
              status:
                type: string
                example: 404 NOT_FOUND
              erros:
                type: array
                items:
                  properties:
                    codigo:
                      type: string
                      example: Não encontrado.
                    mensagem:
                      type: string
                      example: Perfil não encontrado.
  /perfil/{nome}/nome:
    get:
      tags:
        - Perfil
      summary: Buscando Perfil Pelo Perfil Nome
      description: Buscando Perfil Pelo Perfil Nome na Plataforma
      operationId: buscandoPerfilPeloNome
      produces:
        - application/json
      parameters:
        - name: nome
          in: path
          description: Nome do Perfil
          required: true
          type: string
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/PerfilApiResponse'
        '404':
          description: not found operation
          schema:
            type: object
            properties:
              status:
                type: string
                example: 404 NOT_FOUND
              erros:
                type: array
                items:
                  properties:
                    codigo:
                      type: string
                      example: Não encontrado.
                    mensagem:
                      type: string
                      example: Perfil não encontrado.
definitions:
  PerfilResumidoApiResponse:
    type: object
    properties:
      guid:
        type: string
        example: aaaa-bbbb-cccc-dddd-eeeee
      nome:
        type: string
        example: Moderator
  PerfilApiResponse:
    properties:
      guid:
        type: string
        example: aaaa-bbbb-cccc-dddd-eeeee
      nome:
        type: string
        example: Moderator
      roles:
        type: array
        items:
          $ref: '#/definitions/RoleApiResponse'
  RoleApiResponse:
    type: object
    properties:
      nome:
        type: string
        example: MENU_LOJA