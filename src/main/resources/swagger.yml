                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
    patch:
      tags:
        - Loja
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      summary: Alterando Status de uma Loja
      description: Alterando Status de uma Loja na Plataforma
      operationId: alterandoStatusLoja
      requestBody:
        description: Alterando Loja Existente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusApiRequest'
        required: true
      responses:
        '202':
          description: Accepted successful operation
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /loja/paginada:
    get:
      tags:
        - Loja
      summary: Buscando Lista de Loja Pagina
      description: Buscando Lista de Loja pagina na Plataforma
      operationId: buscandoListaPaginadaLoja
      parameters:
        - name: page
          description: "Numero da pagina atual"
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: cnpj
          description: "CNPJ da Loja"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginacaoApiResponse'
                  - type: object
                    properties:
                      lojas:
                        type: array
                        items:
                          $ref: '#/components/schemas/LojaApiResponse'
  /loja/ativa:
    get:
      tags:
        - Loja
      summary: Buscando Lista de Loja Ativa
      description: Buscando Lista de Loja Ativa na Plataforma
      operationId: buscandoListaLojaAtiva
      parameters:
        - name: email
          description: "E-mail do usuario logado"
          example: "mario7lagoas@gmail.com"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LojaApiResponse'
  /loja/print:
    post:
      tags:
        - Loja
      summary: Relatorio de Loja
      description: Relatorio de Loja na Plataforma
      operationId: relatorioLoja
      requestBody:
        description: Imprimindo um relatorio de  Loja
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/LojaApiResponse'
      responses:
        '200':
          description: successful operation
          content:
            text/plain:
              schema:
                type: string
                example: "data:application/pdf;base64,..."
  /perfil:
    get:
      tags:
        - Perfil
      summary: Buscando Lista de Perfil
      description: Buscando Lista de Perfil na Plataforma
      operationId: buscandoListaPerfil
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerfilApiResponse'
    post:
      tags:
        - Perfil
      summary: Criando Um Perfil
      description: Criando Um Perfil na Plataforma
      operationId: criandoPerfil
      requestBody:
        description: Criando novo Perfil
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilApiRequest'
        required: true
      responses:
        '201':
          description: created successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /perfil/resumido:
    get:
      tags:
        - Perfil
      summary: Buscando Lista de Perfil Resumido
      description: Buscando Lista de Perfil Resumido na Plataforma
      operationId: buscandoListaResumidoPerfil
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
