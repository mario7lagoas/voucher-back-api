openapi: 3.0.3
info:
  title: VouckBack
  description: |-
    Microserviço para geração de voucher como descontos em valor ou percentual paras clientes em seu ponto de venda.

    _Se você que saber mais sobre a TIBBI, então  click [aqui](http://tibbi.com.br)._

  contact:
    email: mario7lagoas@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11

servers:
  - url: http://localhost:8080/voucher-back/v1


tags:
  - name: Voucher
    description: Operações sobre Voucher
  - name: Promoção
    description: Operações sobre Promoção
  - name: Empresa
    description: Operações sobre Empresa
  - name: Loja
    description: Operações sobre Loja
  - name: Perfil
    description: Operações sobre Perfil de Usuario
  - name: Usuario
    description: Operações sobre Usuario
paths:
  /voucher/filter:
    get:
      tags:
        - Voucher
      summary: Buscando Lista de Voucher Por Filtros
      description: Buscando Lista de Voucher Por Filtros na Plataforma
      operationId: buscandoListaFiltroVoucher
      parameters:
        - name: page
          description: "Numero da pagina atual"
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: codigo
          description: "Código do Voucher disponibilizado"
          example: "240422172055905959002"
          in: query
          schema:
            type: string
            default: ""
        - name: descricao
          description: "Descrição da Promoção"
          example: "Promocao de Natal"
          in: query
          schema:
            type: string
            default: ""
        - name: clienteCpf
          description: "CPF do Cliente"
          example: "12345678900"
          in: query
          schema:
            type: string
            default: ""
        - name: pdv
          description: "Numero do PDV"
          example: "101"
          in: query
          schema:
            type: string
            default: ""
        - name: cupomResgate
          description: "Numero do cupom onde o voucher foi resgatado"
          example: "123456"
          in: query
          schema:
            type: string
            default: ""
        - name: voucherStatus
          description: "Status Atual do Voucher"
          example: "DISPONIBILIZADO"
          in: query
          schema:
            type: string
            default: ""
        - name: filialCnpj
          description: "Buscar pelo CNPJ da Filial"
          example: "11111111111111"
          in: query
          schema:
            type: string
            default: ""
        - name: tipoDesconto
          description: "Buscar pelo tipo de Desconto"
          example: "PERCENTUAL"
          in: query
          schema:
            type: string
            default: ""
        - name: inicio
          description: "Inicio da Promoção"
          example: "2024-05-12"
          in: query
          schema:
            type: string
            default: ""
        - name: fim
          description: "Fim da Promoção"
          example: "2029-05-31"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginacaoApiResponse'
                  - type: object
                    properties:
                      transacoes:
                        type: array
                        items:
                          $ref: '#/components/schemas/VoucherFiltroApiResponse'
  /voucher/consulta:
    post:
      tags:
        - Voucher
      summary: Consultando Promoções Disponiveis
      description: Consultando Promoções Disponiveis na Plataforma
      operationId: consultandoPromocoes
      requestBody:
        description: Consultando um Voucher
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaVoucherApiRequest'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaVoucherApiResponse'
  /voucher/confirm:
    post:
      tags:
        - Voucher
      summary: Confirmando Voucher Disponível
      description: Confirmando Voucher Disponível na Plataforma
      operationId: confirmandoVoucher
      requestBody:
        description: Confirmando Voucher Disponível
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/VoucherApiRequest'
      responses:
        '200':
          description: successful operation
  /voucher/cancel:
    post:
      tags:
        - Voucher
      summary: Cancelando Voucher Disponível
      description: Cancelando Voucher Disponível na Plataforma
      operationId: cancelandoVoucher
      requestBody:
        description: Cancelando Voucher Disponível
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/VoucherApiRequest'
      responses:
        '200':
          description: successful operation
  /voucher/resgate:
    post:
      tags:
        - Voucher
      summary: Resgatando Um Voucher Disponivel
      description: Resgatando Um Voucher Disponivel na Plataforma
      operationId: resgatandoVoucher
      requestBody:
        description: Resgatando um Voucher
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherPromocaoApiRequest'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherPromocaoApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /voucher/consumer:
    post:
      tags:
        - Voucher
      summary: Consumindo Voucher Disponbilizado
      description: Consumindo Voucher Disponbilizado na Plataforma
      operationId: consumindoVoucher
      requestBody:
        description: Consumindo Voucher Disponbilizado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherFinalizeApiRequest'
        required: true
      responses:
        '200':
          description: successful operation
  /voucher/rollback:
    post:
      tags:
        - Voucher
      summary: Estornando Voucher Disponbilizado
      description: Estornando Voucher Disponbilizado na Plataforma
      operationId: estornandoVoucher
      requestBody:
        description: Estornando Voucher Disponbilizado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherFinalizeApiRequest'
        required: true
      responses:
        '200':
          description: successful operation
  /voucher/print:
    post:
      tags:
        - Voucher
      summary: Relatorio de Voucher
      description: Relatorio de Voucher na Plataforma
      operationId: relatorioVoucher
      requestBody:
        description: Imprimindo um relatorio de Voucher
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/VoucherFiltroApiResponse'
      responses:
        '200':
          description: successful operation
          content:
            text/plain:
              schema:
                type: string
                example: "data:application/pdf;base64,..."
  /promocao:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção
      description: Buscando Lista de Promoção na Plataforma
      operationId: buscandoListaPromocao
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromocaoApiResponse'
    post:
      tags:
        - Promoção
      summary: Criando Uma Promoção
      description: Criando Uma Promoção na Plataforma
      operationId: criandoPromocao
      requestBody:
        description: Criando nova Promoção
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromocaoApiRequest'
        required: true
      responses:
        '201':
          description: created successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /promocao/{guid}:
    get:
      tags:
        - Promoção
      summary: Buscando Promoção Pelo GUID
      description: Buscando Promoção Pelo GUID na Plataforma
      operationId: buscandoPromocaoPeloGUID
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
    put:
      tags:
        - Promoção
      summary: Alterando Uma Promoção
      description: Alterando Uma Promoção na Plataforma
      operationId: alterandoPromocao
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      requestBody:
        description: Alterando uma Promoção
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromocaoUpdateApiRequest'
        required: true
      responses:
        '202':
          description: accepted successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
    patch:
      tags:
        - Promoção
      summary: Ativando Uma Promoção
      description: Ativando Uma Promoção na Plataforma
      operationId: ativandoPromocao
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      requestBody:
        description: Alterando uma Promoção
        content:
          application/json:
            schema:
              properties:
                autorAlteracao:
                  type: string
                  example: "Joao da Silva"
        required: true
      responses:
        '202':
          description: accepted successful operation
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
    delete:
      tags:
        - Promoção
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      summary: Apagando uma Promoção
      description: Apagando uma Promoção na Plataforma
      operationId: apagandoPromocao
      responses:
        '204':
          description: No Content successful operation
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /promocao/paginada:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção Pagina
      description: Buscando Lista de Promoção pagina na Plataforma
      operationId: buscandoListaPaginadaPromocao
      parameters:
        - name: page
