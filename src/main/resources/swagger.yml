openapi: 3.0.3
info:
  title: VouckBack
  description: |-
    Microserviço para geração de voucher como descontos em valor ou percentual paras clientes em seu ponto de venda.

    _Se você que saber mais sobre a REMATEC, então  click [aqui](http://rematecvarejo.com.br). Aproveite e nos façam uma visita!_

  contact:
    email: mario7lagoas@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11

servers:
  - url: http://localhost:8080/voucher-back/v1


tags:
  - name: Promoção
    description: Operações sobre Promoção
  - name: Loja
    description: Operações sobre Loja
  - name: Perfil
    description: Operações sobre Perfil de Usuario
  - name: Usuario
    description: Operações sobre Usuario
paths:
  /promocao:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção
      description: Buscando Lista de Promoção na Plataforma
      operationId: buscandoListaPromocao
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromocaoApiResponse'
    post:
      tags:
        - Promoção
      summary: Criando Uma Promoção
      description: Criando Uma Promoção na Plataforma
      operationId: criandoPromocao
      requestBody:
        description: Criando nova Promoção
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromocaoApiRequest'
        required: true
      responses:
        '201':
          description: created successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 400 BAD_REQUEST
                  erros:
                    type: array
                    items:
                      properties:
                        mensagem:
                          type: string
                          example: "não deve ser nulo"
                        campo:
                          type: string
                          example: "descricao"
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 404 NOT_FOUND
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: "Não encontrado."
                        mensagem:
                          type: string
                          example: "Loja não encontrada."
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 422 UNPROCESSABLE_ENTITY
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: "Não permitido."
                        mensagem:
                          type: string
                          example: "Data inicial maior que data final."
  /promocao/{guid}:
    get:
      tags:
        - Promoção
      summary: Buscando Promoção Pelo GUID
      description: Buscando Promoção Pelo GUID na Plataforma
      operationId: buscandoPromocaoPeloGUID
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 404 NOT_FOUND
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: Não encontrado.
                        mensagem:
                          type: string
                          example: "Promoção não encontrada."
    put:
      tags:
        - Promoção
      summary: Alterando Uma Promoção
      description: Alterando Uma Promoção na Plataforma
      operationId: alterandoPromocao
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      requestBody:
        description: Alterando uma Promoção
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromocaoUpdateApiRequest'
        required: true
      responses:
        '202':
          description: accepted successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromocaoApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 400 BAD_REQUEST
                  erros:
                    type: array
                    items:
                      properties:
                        mensagem:
                          type: string
                          example: "não deve ser nulo"
                        campo:
                          type: string
                          example: "descricao"
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 404 NOT_FOUND
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: "Não encontrado."
                        mensagem:
                          type: string
                          example: "Promoção não encontrada."
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 422 UNPROCESSABLE_ENTITY
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: "Não permitido."
                        mensagem:
                          type: string
                          example: "Data inicial maior que data final."
    delete:
      tags:
        - Promoção
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          required: true
          schema:
            type: string
      summary: Apagando uma Promoção
      description: Apagando uma Promoção na Plataforma
      operationId: apagandoPromocao
      responses:
        '204':
          description: No Content successful operation
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    example: 404 NOT_FOUND
                  erros:
                    type: array
                    items:
                      properties:
                        codigo:
                          type: string
                          example: Não encontrado.
                        mensagem:
                          type: string
                          example: "Promoção não encontrada."
  /promocao/paginada:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção Pagina
      description: Buscando Lista de Promoção pagina na Plataforma
      operationId: buscandoListaPaginadaPromocao
      parameters:
        - name: page
          description: "Numero da pagina atual"
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: descricao
          description: "Descrição da Promoção"
          example: "Promocao de NataL"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginacaoApiResponse'
                  - type: object
                    properties:
                      promocoes:
                        type: array
                        items:
                          $ref: '#/components/schemas/PromocaoApiResponse'
  /promocao/filter:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção Por Filtros
      description: Buscando Lista de Promoção Por Filtros na Plataforma
      operationId: buscandoListaFiltroPromocao
      parameters:
        - name: page
          description: "Numero da pagina atual"
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: descricao
          description: "Descrição da Promoção"
          example: "Promocao de NataL"
          in: query
          schema:
            type: string
            default: ""
        - name: status
          description: "Status da Promoção"
          example: "ATIVA"
          in: query
          schema:
            type: string
            default: ""
        - name: tipo
          description: "Tipo de desconto da Promoção"
          example: "PERCENTUAL"
          in: query
          schema:
            type: string
            default: ""
        - name: inicio
          description: "Inicio da Promoção"
          example: "2024-05-12"
          in: query
          schema:
            type: string
            default: ""
        - name: fim
          description: "Fim da Promoção"
          example: "2029-05-31"
          in: query
          schema:
            type: string
            default: ""
      responses:
