          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: descricao
          description: "Descrição da Promoção"
          example: "Promocao de NataL"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginacaoApiResponse'
                  - type: object
                    properties:
                      promocoes:
                        type: array
                        items:
                          $ref: '#/components/schemas/PromocaoApiResponse'
  /promocao/filter:
    get:
      tags:
        - Promoção
      summary: Buscando Lista de Promoção Por Filtros
      description: Buscando Lista de Promoção Por Filtros na Plataforma
      operationId: buscandoListaFiltroPromocao
      parameters:
        - name: page
          description: "Numero da pagina atual"
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          description: "Quantidade de registro por pagina"
          in: query
          schema:
            type: integer
            default: 10
        - name: descricao
          description: "Descrição da Promoção"
          example: "Promocao de NataL"
          in: query
          schema:
            type: string
            default: ""
        - name: status
          description: "Status da Promoção"
          example: "ATIVA"
          in: query
          schema:
            type: string
            default: ""
        - name: tipo
          description: "Tipo de desconto da Promoção"
          example: "PERCENTUAL"
          in: query
          schema:
            type: string
            default: ""
        - name: inicio
          description: "Inicio da Promoção"
          example: "2024-05-12"
          in: query
          schema:
            type: string
            default: ""
        - name: fim
          description: "Fim da Promoção"
          example: "2029-05-31"
          in: query
          schema:
            type: string
            default: ""
        - name: email
          description: "E-mail do usuario logado"
          example: "mario7lagoas@gmail.com"
          in: query
          schema:
            type: string
            default: ""
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginacaoApiResponse'
                  - type: object
                    properties:
                      promocoes:
                        type: array
                        items:
                          $ref: '#/components/schemas/PromocaoApiResponse'
  /promocao/print:
    post:
      tags:
        - Promoção
      summary: Relatorio de Promoção
      description: Relatorio de Promoção na Plataforma
      operationId: relatorioPromocao
      requestBody:
        description: Imprimindo um relatorio de Promoção
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PromocaoApiResponse'
      responses:
        '200':
          description: successful operation
          content:
            text/plain:
              schema:
                type: string
                example: "data:application/pdf;base64,..."
  /empresa:
    get:
      tags:
        - Empresa
      summary: Buscando Lista de Empresa
      description: Buscando Lista de Empresa na Plataforma
      operationId: buscandoListaEmpresa
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmpresaApiResponse'
    post:
      tags:
        - Empresa
      summary: Empresa Uma Loja
      description: Criando Uma Empresa na Plataforma
      operationId: criandoEmpresa
      requestBody:
        description: Criando nova Empresa
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpresaApiRequest'
        required: true
      responses:
        '201':
          description: created successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpresaApiResponse'
        '400':
          description: bad request operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
        '422':
          description: unprocessable operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
  /loja:
