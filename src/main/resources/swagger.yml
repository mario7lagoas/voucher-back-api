                $ref: '#/components/schemas/LojaApiResponse'
        '404':
          description: not found operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
    put:
      tags:
        - Loja
      parameters:
        - name: guid
          in: path
          description: Informe o GUID
          example: aaaa-bbbb-cccc-dddd-eeeee
          required: true
          schema:
            type: string
      summary: Alterando uma Loja
      description: Alterando uma Loja na Plataforma
      operationId: alterandoLoja
      requestBody:
        description: Alterando Loja Existente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LojaUpdateApiRequest'
      responses:
        '202':
          description: accepted successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LojaApiResponse'
        '404':
