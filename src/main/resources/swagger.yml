      tags:
        - Loja
      summary: Buscando Lista de Loja
      description: Buscando Lista de Loja na Plataforma
      operationId: buscandoListaLoja
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LojaApiResponse'
    post:
      tags:
        - Loja
      summary: Criando Uma Loja
      description: Criando Uma Loja na Plataforma
      operationId: criandoLoja
      requestBody:
        description: Criando nova Loja
        content:
